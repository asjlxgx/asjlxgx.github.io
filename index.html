<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>清幽谷</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#000;color:#fff;padding-bottom:70px}

.header{display:flex;padding:16px;gap:10px;align-items:center}
.logo{font-size:20px;font-weight:bold}
.search{flex:1;background:#1a1a1a;padding:10px 14px;border-radius:30px}
.login{background:#11C28C;color:#000;padding:10px 16px;border-radius:10px;border:none;font-weight:bold}

.tabs{display:flex;gap:16px;padding:10px 16px;overflow-x:auto}
.tab{color:#777;font-size:16px;white-space:nowrap}
.tab.active{color:#11C28C}

.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:20px 16px;text-align:center}
.grid-icon{width:50px;height:50px;background:#1a1a1a;border-radius:14px;margin:0 auto 6px;display:grid;place-items:center;font-size:24px}

.page{display:none;padding:16px}
.page.active{display:block}

.item{background:#111;border-radius:12px;margin-bottom:10px}
.item img,.item video{width:100%;display:block}
.item .name{padding:10px}

#file{display:none}
.btn{background:#11C28C;color:#000;width:100%;padding:14px;border:none;border-radius:12px;margin-top:10px}

#tip{margin:10px;padding:12px;border-radius:12px;text-align:center;font-weight:bold;display:none}

.footer{position:fixed;bottom:0;left:0;right:0;height:60px;background:#0a0a0a;display:flex;justify-content:space-around;align-items:center}
.footer-item{color:#777;font-size:12px;text-align:center}
</style>
</head>
<body>

<div class="header">
  <div class="logo">清幽谷</div>
  <div class="search">搜索</div>
  <button class="login">登录</button>
</div>

<div class="tabs">
  <div class="tab active" onclick="show('home')">首页</div>
  <div class="tab" onclick="show('recommend')">推荐</div>
  <div class="tab" onclick="show('video')">视频</div>
  <div class="tab" onclick="show('upload')">上传</div>
  <div class="tab" onclick="show('my')">我的</div>
</div>

<div class="grid">
  <div><div class="grid-icon">📱</div><div>APP</div></div>
  <div><div class="grid-icon">📖</div><div>小说</div></div>
  <div><div class="grid-icon">🎬</div><div>视频</div></div>
  <div><div class="grid-icon">🖼️</div><div>图片</div></div>
  <div><div class="grid-icon">🔥</div><div>推广</div></div>
  <div><div class="grid-icon">🎁</div><div>免费</div></div>
  <div><div class="grid-icon">✅</div><div>签到</div></div>
  <div><div class="grid-icon">⭐</div><div>会员</div></div>
</div>

<div id="tip"></div>

<div id="home" class="page active"></div>
<div id="recommend" class="page"></div>
<div id="video" class="page"></div>

<div id="upload" class="page">
  <input type="file" id="file" accept="image/*,video/*" multiple>
  <button class="btn" onclick="selectFile()">选择文件（可多选）</button>
  <button class="btn" onclick="upload()">上传</button>
</div>

<div id="my" class="page">
  <div id="myList"></div>
</div>

<div class="footer">
  <div class="footer-item" onclick="show('home')">🏠 首页</div>
  <div class="footer-item" onclick="show('msg')">💬 消息</div>
  <div class="footer-item" onclick="show('upload')">📤 上传</div>
  <div class="footer-item" onclick="show('find')">🔍 发现</div>
  <div class="footer-item" onclick="show('my')">👤 我的</div>
</div>

<script>
let files = [];
const tip = document.getElementById('tip');

function show(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  tip.style.display = 'none';
}

function selectFile() {
  document.getElementById('file').click();
  document.getElementById('file').onchange = e => {
    files = Array.from(e.target.files);
    tip.style.display = 'block';
    tip.style.background = '#11C28C';
    tip.innerText = '✅ 已选择 ' + files.length + ' 个文件';
  }
}

async function upload() {
  if (files.length === 0) {
    tip.style.display = 'block';
    tip.style.background = '#ff4444';
    tip.innerText = '❌ 请选择文件';
    return;
  }

  tip.style.display = 'block';
  tip.style.background = '#11C28C';
  tip.innerText = '⏳ 上传中...';

  let list = JSON.parse(localStorage.getItem('myList') || '[]');

  for (let file of files) {
    const url = await readFile(file);
    list.unshift({
      url,
      name: file.name,
      isImg: file.type.startsWith('image/')
    });
  }

  localStorage.setItem('myList', JSON.stringify(list));

  tip.style.innerText = '✅ 全部上传成功！';
  setTimeout(() => show('my'), 1000);
  loadMyList();
  files = [];
}

function readFile(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.readAsDataURL(file);
  });
}

function loadMyList() {
  const arr = JSON.parse(localStorage.getItem('myList') || '[]');
  document.getElementById('myList').innerHTML = arr.map(item => `
    <div class="item">
      ${item.isImg ? `<img src="${item.url}">` : `<video controls src="${item.url}"></video>`}
      <div class="name">${item.name}</div>
    </div>
  `).join('');
}

window.onload = loadMyList;
</script>
</body>
</html>
