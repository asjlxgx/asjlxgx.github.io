<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国轩社区 - 资源社区</title>
    <style>
        /* === 全局样式 === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            padding-bottom: 60px;
        }

        /* === 顶部状态栏 === */
        .status-bar {
            height: 20px;
            background: #000;
            color: #fff;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            padding: 0 10px;
            align-items: center;
        }

        /* === 顶部导航 === */
        .header {
            display: flex;
            align-items: center;
            padding: 10px;
            background: #fff;
            border-bottom: 1px solid #eee;
        }
        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #ccc;
            margin-right: 10px;
        }
        .search-box {
            flex: 1;
            background: #f0f0f0;
            border-radius: 15px;
            padding: 5px 10px;
            display: flex;
            align-items: center;
            color: #999;
        }
        .menu-icon {
            font-size: 20px;
            margin-left: 10px;
        }

        /* === 分类标签 === */
        .tabs {
            display: flex;
            background: #fff;
            border-bottom: 1px solid #eee;
        }
        .tabs a {
            padding: 10px 15px;
            text-decoration: none;
            color: #333;
            font-size: 16px;
        }
        .tabs a.active {
            color: #ff5000;
            border-bottom: 2px solid #ff5000;
        }

        /* === 内容区 === */
        .content {
            padding: 10px;
        }
        .banner {
            width: 100%;
            height: 100px;
            background: #00aaff;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
        }
        .icon-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
        }
        .icon-item {
            width: 20%;
            text-align: center;
            margin-bottom: 15px;
        }
        .icon-item img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #ffcc00;
            margin-bottom: 5px;
        }
        .icon-item span {
            font-size: 12px;
            color: #333;
        }

        /* === 用户动态 === */
        .post {
            background: #fff;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            border: 1px solid #eee;
        }
        .post-header {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .post-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #ccc;
            margin-right: 10px;
        }
        .post-info {
            flex: 1;
        }
        .post-name {
            font-size: 14px;
            font-weight: bold;
        }
        .post-time {
            font-size: 12px;
            color: #999;
        }
        .post-content {
            font-size: 14px;
            color: #333;
        }

        /* === 底部导航 === */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #fff;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #eee;
        }
        .footer-item {
            text-align: center;
            color: #666;
            font-size: 12px;
        }
        .footer-item.active {
            color: #ff5000;
        }
        .footer-icon {
            font-size: 20px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    

    <!-- 顶部导航 -->
    <header class="header">
        <div class="avatar"></div>
        <div class="search-box">国轩社</div>
        <div class="menu-icon">☰</div>
    </header>

    <!-- 分类标签 -->
    <nav class="tabs">
        <a href="#" class="active">最新</a>
        <a href="#">推荐</a>
        <a href="#">视频库</a>
        <a href="#">免费视频</a>
        <a href="#">图片</a>
        <a href="#">资源</a>
    </nav>

    <!-- 内容区 -->
    <main class="content">
        <!-- 横幅 -->
        <div class="banner">相关找客服！</div>

        <!-- 图标网格 -->
        <div class="icon-grid">
            <div class="icon-item"><div class="icon-item"><img src="#" alt="APP"><span>APP</span></div>
            <div class="icon-item"><img src="#" alt="小说"><span>小说</span></div>
            <div class="icon-item"><img src="#" alt="视频"><span>视频</span></div>
            <div class="icon-item"><img src="#" alt="图片"><span>图片</span></div>
            <div class="icon-item"><img src="#" alt="推广"><span>推广</span></div>
            <div class="icon-item"><img src="#" alt="免费视频"><span>免费视频</span></div>
            <div class="icon-item"><img src="#" alt="签到"><span>签到</span></div>
            <div class="icon-item"><img src="#" alt="会员"><span>会员</span></div>
        </div>

        <!-- 用户动态 -->
        <div class="post">
            <div class="post-header">
                <div class="post-avatar"></div>
                <div class="post-info">
                    <div class="post-name">老幺变老妖</div>
                    <div class="post-time">2025-03-24 17:16 · 手机端 · 公开内容</div>
                </div>
            </div>
            <div class="post-content">
                这里是用户发布的内容...
            </div>
        </div>
    </main>

    <!-- 底部导航 -->
    <footer class="footer">
        <div class="footer-item active">
            <div class="footer-icon">🏠</div>
            <div>首页</div>
        </div>
        <div class="footer-item">
            <div class="footer-icon">💬</div>
            <div>消息</div>
        </div>
        <div class="footer-item">
            <div class="footer-icon">➕</div>
            <div>发布</div>
        </div>
        <div class="footer-item">
            <div class="footer-icon">🔍</div>
            <div>发现</div>
        </div>
        <div class="footer-item">
            <div class="footer-icon">👤</div>
            <div>我的</div>
        </div>
    </footer>

    <script>
        // 简单的交互：点击图标变色
        document.querySelectorAll('.icon-item').forEach(item => {
            item.addEventListener('click', () => {
                alert('点击了：' + item.querySelector('span').innerText);
            });
        });
    </script>
</body>
</html>
