<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>清幽谷 - 云端版</title>
<!-- 引入 Supabase 的客户端库 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#000;color:#fff;padding-bottom:70px}
/* 保持你原来的样式不变 */
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:999;display:none}
.box{background:#111;padding:30px;border-radius:20px;width:90%;max-width:380px}
.box h2{margin-bottom:20px;text-align:center;color:#11C28C}
.input{width:100%;padding:14px;background:#1a1a1a;border:none;border-radius:12px;margin-bottom:12px;color:#fff}
.btn{width:100%;padding:14px;background:#11C28C;color:#000;border:none;border-radius:12px;font-weight:bold;margin-top:10px}
.toggle{text-align:center;margin-top:12px;color:#777;cursor:pointer}
.header{display:flex;padding:16px;gap:10px;align-items:center}
.logo{font-size:20px;font-weight:bold}
.search{flex:1;background:#1a1a1a;padding:10px 14px;border-radius:30px}
#userInfo{color:#11C28C;font-weight:bold}
.tabs{display:flex;gap:16px;padding:10px 16px;overflow-x:auto}
.tab{color:#777;white-space:nowrap;cursor:pointer}
.tab.active{color:#11C28C}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:20px;text-align:center}
.grid-icon{width:50px;height:50px;background:#1a1a1a;border-radius:14px;display:grid;place-items:center;font-size:24px}
.page{display:none;padding:16px}
.page.active{display:block}
.item{background:#111;border-radius:12px;margin-bottom:10px;position:relative;overflow:hidden}
.item img,.item video{width:100%;display:block}
.item .name{padding:10px}
.del{position:absolute;top:10px;right:10px;background:#ff4444;color:#fff;border:none;border-radius:50%;width:32px;height:32px;font-size:18px;cursor:pointer;z-index:10}
#file{display:none}
.upload-btn{background:#11C28C;color:#000;width:100%;padding:14px;border:none;border-radius:12px;margin-top:10px}
#tip{margin:10px;padding:12px;border-radius:12px;text-align:center;font-weight:bold;display:none}
.footer{position:fixed;bottom:0;left:0;right:0;height:60px;background:#0a0a0a;display:flex;justify-content:space-around;align-items:center}
.footer-item{color:#777;font-size:12px;text-align:center;cursor:pointer}
</style>
</head>
<body>

<div class="modal" id="modal">
  <div class="box">
    <h2 id="title">登录</h2>
    <input class="input" id="user" placeholder="账号">
    <input class="input" id="pwd" type="password" placeholder="密码">
    <button class="btn" onclick="loginReg()">登录</button>
    <div class="toggle" onclick="toggleMode()">没有账号？去注册</div>
  </div>
</div>

<div class="header">
  <div class="logo">清幽谷</div>
  <div class="search">搜索</div>
  <div id="userInfo"></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="show('home')">首页</div>
  <div class="tab" onclick="show('recommend')">推荐</div>
  <div class="tab" onclick="show('video')">视频</div>
  <div class="tab" onclick="goUpload()">上传</div>
  <div class="tab" onclick="goMy()">我的</div>
</div>

<div class="grid">
  <div><div class="grid-icon">📱</div><div>APP</div></div>
  <div><div class="grid-icon">📖</div><div>小说</div></div>
  <div><div class="grid-icon">🎬</div><div>视频</div></div>
  <div><div class="grid-icon">🖼️</div><div>图片</div></div>
  <div><div class="grid-icon">🔥</div><div>推广</div></div>
  <div><div class="grid-icon">🎁</div><div>免费</div></div>
  <div><div class="grid-icon">✅</div><div>签到</div></div>
  <div><div class="grid-icon">⭐</div><div>会员</div></div>
</div>

<div id="tip"></div>

<div id="home" class="page active"></div>
<div id="recommend" class="page"></div>
<div id="video" class="page"></div>

<div id="upload" class="page">
  <div style="background:#111;padding:20px;border-radius:12px">
    <h3 style="margin-bottom:10px">添加云端资源</h3>
    <p style="color:#888;font-size:12px;margin-bottom:10px">请输入视频/图片的网络直链</p>
    <input class="input" id="linkUrl" placeholder="粘贴链接 (如B站/优酷/图片地址)">
    <input class="input" id="linkName" placeholder="资源标题">
    <button class="upload-btn" onclick="addCloudLink()">保存到云端</button>
  </div>
</div>

<div id="my" class="page">
  <div id="myList"></div>
</div>

<div class="footer">
  <div class="footer-item" onclick="show('home')">🏠 首页</div>
  <div class="footer-item" onclick="show('msg')">💬 消息</div>
  <div class="footer-item" onclick="goUpload()">📤 上传</div>
  <div class="footer-item" onclick="show('find')">🔍 发现</div>
  <div class="footer-item" onclick="goMy()">👤 我的</div>
</div>

<script>
// ==========================================
// ⬇️⬇️⬇️ 在这里填入你的 Supabase 配置 ⬇️⬇️⬇️
const SUPABASE_URL = '你的SUPABASE_PROJECT_URL'; 
const SUPABASE_KEY = '你的SUPABASE_ANON_KEY';
// ==========================================

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let isReg = false

function toggleMode(){
  isReg = !isReg
  title.innerText = isReg ? '注册' : '登录'
  document.querySelector('.toggle').innerText = isReg ? '已有账号？去登录' : '没有账号？去注册'
}

function openModal(){ modal.style.display = 'flex' }

function loginReg(){
  let u = user.value.trim()
  let p = pwd.value.trim()
  if(!u || !p){ alert('请输入账号密码'); return }

  // 这里为了简单，依然用本地存一下登录状态，但数据会传到云端
  if(isReg){
    localStorage.setItem('users_' + u, p);
    alert('注册成功，请登录');
    toggleMode();
  }else{
    let savedP = localStorage.getItem('users_' + u);
    if(!savedP || savedP !== p){ alert('账号或密码错误'); return }
    
    localStorage.setItem('loginUser', u)
    modal.style.display = 'none'
    updateUser()
    show('home')
  }
}

function updateUser(){
  let u = localStorage.getItem('loginUser')
  userInfo.innerHTML = u
    ? `${u} <span onclick="logout()" style="color:#ff4444;cursor:pointer">登出</span>`
    : '<span onclick="openModal()" style="cursor:pointer">登录/注册</span>'
}

function logout(){
  localStorage.removeItem('loginUser')
  updateUser()
  show('home')
}

function checkLogin(){
  if(!localStorage.getItem('loginUser')){
    alert('请先登录')
    openModal()
    return false
  }
  return true
}

function show(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
  document.getElementById(id).classList.add('active')
  tip.style.display = 'none'
  if(id === 'my') loadMy(); // 进入我的页面时刷新数据
}

function goUpload(){ if(checkLogin()) show('upload') }
function goMy(){ if(checkLogin()) show('my') }

// --- 核心：保存到云端 ---
async function addCloudLink(){
  if(!checkLogin()) return
  let url = linkUrl.value.trim()
  let name = linkName.value.trim()
  let currentUser = localStorage.getItem('loginUser')

  if(!url || !name){ alert('请填写标题和链接'); return }

  tip.style.display = 'block'
  tip.innerText = '正在上传到云端...'

  // 判断图片还是视频
  let isImg = url.match(/\.(jpeg|jpg|gif|png)$/) != null

  // 调用 Supabase 插入数据
  const { data, error } = await supabase
    .from('files')
    .insert([
      { name: name, url: url, user_id: currentUser, is_img: isImg }
    ])

  if (error) {
    alert('上传失败: ' + error.message)
    tip.innerText = '上传失败'
  } else {
    alert('上传成功！所有人都能看到了')
    linkUrl.value = ''
    linkName.value = ''
    show('my')
  }
}

// --- 核心：从云端读取 ---
async function loadMy(){
  let currentUser = localStorage.getItem('loginUser')
  if(!currentUser) return

  tip.style.display = 'block'
  tip.innerText = '正在从云端加载...'

  // 查询数据库
  const { data, error } = await supabase
    .from('files')
    .select('*')
    .eq('user_id', currentUser)
    .order('id', { ascending: false })

  if (error) {
    alert('加载失败')
  } else {
    let html = ''
    // 增加一个清空按钮
    html += `<button class="upload-btn" style="background:#ff4444;margin-bottom:15px" onclick="clearAll()">清空所有</button>`
    
    data.forEach(item => {
      html += `
        <div class="item">
          <button type="button" class="del" onclick="del(${item.id})">×</button>
          ${item.is_img 
            ? `<img src="${item.url}">` 
            : `<video controls src="${item.url}"></video>`}
          <div class="name">${item.name}</div>
        </div>
      `
    })
    
    myList.innerHTML = html
    tip.style.display = 'none'
  }
}

// --- 删除 ---
async function del(id){
  if(!confirm('确定删除？')) return
  
  const { error } = await supabase
    .from('files')
    .delete()
    .eq('id', id)

  if(!error){
    loadMy()
  }
}

async function clearAll(){
    if(!confirm('确定清空所有资源？')) return
    let currentUser = localStorage.getItem('loginUser')
    
    const { error } = await supabase
        .from('files')
        .delete()
        .eq('user_id', currentUser)
        
    if(!error) loadMy()
}

</script>
</body>
</html>
