<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>媒体上传</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#f0f2f5;padding:20px}
.container{max-width:800px;margin:40px auto;background:#fff;border-radius:16px;overflow:hidden}
.header{background:#2563eb;color:white;padding:24px}
.main{padding:30px}
.upload-box{border:2px dashed #cbd5e1;padding:40px 20px;text-align:center;border-radius:12px;background:#fafbfb;cursor:pointer}
.upload-box:hover{border-color:#2563eb}
#file{display:none}
.btn{background:#2563eb;color:white;border:none;padding:14px;width:100%;border-radius:12px;margin-top:20px;font-size:16px}
video,img{width:100%;border-radius:12px;margin-top:20px}
.status{margin-top:15px;font-size:14px;color:#333;padding:10px;background:#e6f7ff;border-radius:8px}
.list{margin-top:30px}
.item{padding:12px;background:#f8f9fa;border-radius:10px;margin-bottom:10px}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>视频 & 图片上传</h1>
  </div>
  <div class="main">

    <div class="upload-box" onclick="document.getElementById('file').click()">
      <h3>点击选择文件</h3>
      <p>支持：图片、视频</p>
    </div>

    <input type="file" id="file" accept="video/*,image/*">
    <button class="btn" onclick="upload()">上传并查看</button>

    <div id="status"></div>
    <img id="img" style="display:none">
    <video id="video" controls style="display:none"></video>

    <div class="list" id="list"></div>
  </div>
</div>

<script>
let file;
const fileInput = document.getElementById('file');
const img = document.getElementById('img');
const video = document.getElementById('video');
const status = document.getElementById('status');
const list = document.getElementById('list');

fileInput.onchange = (e) => {
  file = e.target.files[0];
  status.innerHTML = "✅ 已选择：" + file.name;
};

function upload() {
  if (!file) {
    alert("请先选择图片或视频！");
    return;
  }

  const url = URL.createObjectURL(file);
  const isImage = file.type.startsWith("image/");
  const isVideo = file.type.startsWith("video/");

  // 隐藏之前的
  img.style.display = "none";
  video.style.display = "none";

  if (isImage) {
    img.src = url;
    img.style.display = "block";
    status.innerHTML = "✅ 图片上传成功：" + file.name;
  }

  if (isVideo) {
    video.src = url;
    video.style.display = "block";
    status.innerHTML = "✅ 视频上传成功：" + file.name;
  }

  // 加到列表
  const item = document.createElement("div");
  item.className = "item";
  item.innerText = "✅ " + file.name;
  list.appendChild(item);
}
</script>
</body>
</html>
